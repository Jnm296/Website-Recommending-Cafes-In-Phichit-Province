<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เปลี่ยนรหัสผ่าน</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css"> 
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
    /* ... (โค้ด body เดิม) ... */
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #f8c0cf 0%, #e5eadd 100%);
        font-family: 'Kanit', sans-serif;
    }

    /* ... (โค้ด .container เดิม) ... */
    .container {
        width: 90%;
        max-width: 1000px;
    }

    /* ... (โค้ด .profile-grid เดิม) ... */
    .profile-grid {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 20px;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    /* --- ส่วนที่แก้ไข: ปรับขนาดรูปโปรไฟล์ --- */
    .user-avatar {
    width: 90px;  /* ลดจาก 100px เป็น 90px */
    height: 90px;
    margin: 10px auto 20px auto; /* เพิ่ม margin ด้านล่างเป็น 20px */
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #4a5d4d;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f0f0f0;
}

    .user-avatar img {
        max-width: 70%; /* ปรับขนาดรูปภาพไม่ให้เกิน 70% ของกรอบ */
        max-height: 70%;
        object-fit: contain; /* เปลี่ยนจาก cover เป็น contain เพื่อให้เห็นรูปทั้งรูป */
    }

    /* ... (โค้ดอื่นๆ ใน .profile-sidebar) ... */
    .profile-sidebar {
        text-align: center;
    }

    /* --- ส่วนที่แก้ไข: จัดตำแหน่ง "จำรหัสผ่านเก่าไม่ได้?" --- */
    .profile-main .card {
        padding: 30px;
        display: flex; /* เพิ่ม display: flex เพื่อให้จัดตำแหน่งภายใน card ได้ง่ายขึ้น */
        flex-direction: column;
        align-items: center; /* จัดตำแหน่งกึ่งกลางในแนวนอน */
    }

    /* ... (โค้ด .forgot-pass เดิม) ... */
    .forgot-pass {
        font-size: 0.9rem;
        color: #4a5d4d;
        text-decoration: none;
        display: block;
        margin-top: 15px;
        text-align: center;
        font-weight: 500;
    }

    /* --- ส่วนที่เพิ่มเติม: จัดตำแหน่ง form และปุ่ม --- */
    #change-password-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 100%; /* ให้ form เต็มความกว้างของ card (หรือ max-width ที่กำหนดไว้เดิม) */
        max-width: 400px; /* รักษาขนาด max-width เดิมไว้ */
    }

    /* สไตล์สำหรับ input และ button (เพื่อความสวยงามและสม่ำเสมอ) */
    #change-password-form input[type="password"] {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: 'Kanit', sans-serif;
        width: 100%; /* ให้ input เต็มความกว้างของ form */
        box-sizing: border-box; /* สำคัญมากเพื่อให้ padding ไม่ทำให้ขนาดเกิน */
    }

    #change-password-form button[type="submit"] {
        padding: 12px;
        background-color: #4a5d4d;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Kanit', sans-serif;
        font-weight: 500;
        width: 100%; /* ให้ปุ่มเต็มความกว้างของ form */
        box-sizing: border-box;
    }

    /* ปรับระยะห่างระหว่างรูปกับชื่อบัญชี */
#user-name-display {
    margin-top: 15px; /* เพิ่มพื้นที่ด้านบนของชื่อ */
    margin-bottom: 5px;
    word-wrap: break-word; /* ป้องกันชื่อยาวเกินจนล้น */
}

#user-email {
    display: block;
    width: 100%;
    overflow-wrap: break-word; /* ตัดเฉพาะจุดที่จำเป็น */
    word-wrap: break-word;
    padding: 0 20px;
}

</style>
</head>
<body>

    <div class="container">
        <div class="profile-grid">
            
            <aside class="profile-sidebar">
                <div class="user-avatar">
                    <img id="user-photo" src="../imagas/coffee-beans.png" alt="โปรไฟล์">
                </div>
                
                <h2 id="user-name-display">ผู้ใช้งาน</h2>
                <p id="user-email" style="word-break: break-all; padding: 0 10px;">...</p>
                
                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                
                <a href="index.html" class="logout-btn" style="background-color: #777; display: block; text-decoration: none; color: white; padding: 10px; border-radius: 5px;">กลับไปหน้าโปรไฟล์</a>
            </aside>

            <main class="profile-main">
                <section class="card" style="padding: 30px;">
                    <h3 style="margin-bottom: 20px;">เปลี่ยนรหัสผ่านใหม่</h3>
                    
                    <form id="change-password-form" style="display: flex; flex-direction: column; gap: 15px; max-width: 400px;">
                        <input type="password" id="current-password" placeholder="รหัสผ่านเดิม" required style="padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Kanit', sans-serif;">
                        
                        <input type="password" id="new-password" placeholder="รหัสผ่านใหม่" required style="padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Kanit', sans-serif;">
                        
                        <input type="password" id="confirm-password" placeholder="ยืนยันรหัสผ่านใหม่" required style="padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Kanit', sans-serif;">
                        
                        <button type="submit" style="padding: 12px; background-color: #4a5d4d; color: white; border: none; border-radius: 8px; cursor: pointer; font-family: 'Kanit', sans-serif; font-weight: 500;">อัปเดตรหัสผ่าน</button>
                    </form>
                    
                    <a href="#" id="forgot-password-link" class="forgot-pass">จำรหัสผ่านเก่าไม่ได้?</a>
                </section>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, updatePassword, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Config เดิมของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyDt4kR8SacD2LPwmyFpcZ4FNHJpCT-pOwc",
            authDomain: "phichit-cafe.firebaseapp.com",
            projectId: "phichit-cafe",
            storageBucket: "phichit-cafe.firebasestorage.app",
            messagingSenderId: "825175930096",
            appId: "1:825175930096:web:32336ea0ebc1cdf3c33e35"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        

        let currentUserEmail = "";

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "../index.html";
                return;
            }
            currentUserEmail = user.email;
            document.getElementById('user-email').innerText = user.email;
            if (user.photoURL) document.getElementById('user-photo').src = user.photoURL;

            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                document.getElementById('user-name-display').innerText = userData.name;
                if (userData.photo) document.getElementById('user-photo').src = userData.photo;
            }
        });

        // ฟังก์ชันเปลี่ยนรหัสผ่าน
        const passwordForm = document.getElementById('change-password-form');
        passwordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            // const currentPassword = document.getElementById('current-password').value; // ไม่ได้ใช้
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                alert("รหัสผ่านใหม่ไม่ตรงกัน!");
                return;
            }

            const user = auth.currentUser;
            if (user) {
                try {
                    await updatePassword(user, newPassword);
                    alert("เปลี่ยนรหัสผ่านเรียบร้อยแล้ว! กรุณาเข้าสู่ระบบใหม่");
                    auth.signOut().then(() => {
                        window.location.href = "../index.html";
                    });
                } catch (error) {
                    console.error("Error updating password:", error);
                    // แจ้งเตือนเรื่อง Security (Recent Login)
                    if (error.code === 'auth/requires-recent-login') {
                        alert("เพื่อความปลอดภัย กรุณาออกจากระบบแล้วเข้าสู่ระบบใหม่เพื่อเปลี่ยนรหัสผ่าน");
                    } else {
                        alert("เกิดข้อผิดพลาด: " + error.message);
                    }
                }
            }
        });

        // ฟังก์ชันลืมรหัสผ่าน
        document.getElementById('forgot-password-link').addEventListener('click', async (e) => {
            e.preventDefault();
            if (currentUserEmail) {
                try {
                    await sendPasswordResetEmail(auth, currentUserEmail);
                    alert("ส่งอีเมลรีเซ็ตรหัสผ่านไปที่ " + currentUserEmail + " เรียบร้อยแล้ว กรุณาเช็คอีเมลของคุณ");
                } catch (error) {
                    console.error("Error sending email:", error);
                    alert("เกิดข้อผิดพลาดในการส่งอีเมล: " + error.message);
                }
            }
        });
    </script>
</body>
</html>
