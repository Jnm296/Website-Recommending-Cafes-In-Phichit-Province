<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css"> 
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f8c0cf 0%, #e5eadd 100%);
            font-family: 'Kanit', sans-serif;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        input[type="email"] {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 20px;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }
        button {
            padding: 12px;
            background-color: #4a5d4d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 500;
            font-family: 'Kanit', sans-serif;
        }
        .back-link {
            margin-top: 20px;
            display: block;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* เพิ่ม/แก้ไข ในส่วน <style> เดิม */
h2 {
    color: #4a5d4d; /* สีเขียวเข้มแบบเดียวกับปุ่มและหัวข้อหน้า Login */
    font-size: 1.8rem;
    font-weight: 600;
    margin-bottom: 5px;
}

p {
    color: #888; /* ปรับสีเทาให้อ่อนลงเล็กน้อยเหมือนภาพที่ 2 */
    font-size: 0.9rem;
    margin-top: 0;
    margin-bottom: 25px;
}
    </style>
</head>
<body>

    <div class="card">
      <h2>ลืมรหัสผ่าน</h2>
    <p>กรอกอีเมลของคุณเพื่อรับลิงก์ตั้งรหัสผ่านใหม่</p>
        
        <form id="forgot-password-form">
            <input type="email" id="reset-email" placeholder="อีเมลที่ใช้สมัครสมาชิก" required>
            <button type="submit" id="btn-submit">ส่งลิงก์รีเซ็ตรหัสผ่าน</button>
        </form>

        <a href="../login/index.html" class="back-link">← กลับไปหน้าเข้าสู่ระบบ</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDt4kR8SacD2LPwmyFpcZ4FNHJpCT-pOwc",
            authDomain: "phichit-cafe.firebaseapp.com",
            projectId: "phichit-cafe",
            storageBucket: "phichit-cafe.firebasestorage.app",
            messagingSenderId: "825175930096",
            appId: "1:825175930096:web:32336ea0ebc1cdf3c33e35"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const forgotForm = document.getElementById('forgot-password-form');
        const btnSubmit = document.getElementById('btn-submit');

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reset-email').value;

            // เปลี่ยนสถานะปุ่มเพื่อป้องกันการกดซ้ำ
            btnSubmit.innerText = "กำลังส่ง...";
            btnSubmit.disabled = true;

            try {
                await sendPasswordResetEmail(auth, email);
                alert("ระบบได้ส่งลิงก์รีเซ็ตรหัสผ่านไปที่ " + email + " แล้วค่ะ! โปรดตรวจสอบในกล่องจดหมายของคุณ");
                window.location.href = "../login/index.html"; // ส่งกลับไปหน้า Login
            } catch (error) {
                console.error("Error:", error);
                alert("เกิดข้อผิดพลาด: " + error.message);
                btnSubmit.innerText = "ส่งลิงก์รีเซ็ตรหัสผ่าน";
                btnSubmit.disabled = false;
            }
        });

        
    </script>
</body>
</html>
